name: Claude Code Creator
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  generate_code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ask Claude to Generate Code
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          # در اینجا درخواست را به کلاود می‌فرستیم و جواب را در یک فایل ذخیره می‌کنیم
          curl https://api.anthropic.com/v1/messages \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{
              "model": "claude-3-5-sonnet-20240620",
              "max_tokens": 2048,
              "messages": [{"role": "user", "content": "Create a new basic readme or starter helper file for this project."}]
            }' > claude_response.json

      - name: Commit and Push Changes by Claude
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # در اینجا اسکریپت شما یا خود اکشن فایل‌های جدید را به گیت اضافه می‌کند
          git add .
          git commit -m "Code automatically added/updated by Claude AI" || echo "No changes to commit"
          git push
