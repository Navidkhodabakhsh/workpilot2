name: Claude Code Review
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Claude AI Chat
        uses: coleanthony9/claude-action@v1.0.3
        with:
          prompt: "Please review the latest changes in this commit and provide feedback."
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
