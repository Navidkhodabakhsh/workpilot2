name: CI

"on":
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workpilot
          POSTGRES_PASSWORD: workpilot
          POSTGRES_DB: workpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - run: python -m pytest -q

      # Informational only: fails the CI *log* to read, not the build --
      # some known CVEs (e.g. in ecdsa) have no upstream fix yet, and a
      # hard-fail here would block every PR on an issue no one can act on.
      - name: Dependency vulnerability scan (non-blocking)
        continue-on-error: true
        run: |
          pip install -q pip-audit
          python -m pip_audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

      - name: Dependency vulnerability scan (non-blocking)
        continue-on-error: true
        run: npm audit --omit=dev
