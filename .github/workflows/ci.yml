name: Claude Code Action
on:
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened]

jobs:
  claude_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Claude Code Action Official
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}