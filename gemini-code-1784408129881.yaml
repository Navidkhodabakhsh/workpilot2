services:
  # ۱. کانفیگ مربوط به فرانت‌اند (React)
  - type: web
    name: workpilot-frontend
    runtime: static
    buildCommand: npm run build
    publishDir: dist # یا build بسته به کانفیگ ویپک/ویت پروژه‌ات
    routes:
      - src: /*
        dest: /index.html

  # ۲. کانفیگ مربوط به بک‌اند (ASP.NET Core)
  - type: web
    name: workpilot-backend
    runtime: docker # رندر برای دات‌نت بهترین حالتش استفاده از داکر است
    buildCommand: ""
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

databases:
  # ۳. دیتابیس (پستگرس یا هر دیتابیسی که در Phase 0 در نظر داری)
  - name: workpilot-db
    databaseName: workpilot
    user: workpilot_user