services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: workpilot
      POSTGRES_PASSWORD: workpilot
      POSTGRES_DB: workpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Only runs on a brand-new (empty) volume -- seeds a demo org with
      # working phone/password logins (see backend/seed/README.md). If
      # you've already run this stack before, `docker compose down -v`
      # first so postgres_data is empty and this actually gets picked up.
      - ./backend/seed/demo_org_dump.sql:/docker-entrypoint-initdb.d/demo_org_dump.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://workpilot:workpilot@postgres:5432/workpilot
      REDIS_URL: redis://redis:6379/0
      # Only the backend container runs `alembic upgrade head` on boot (see
      # docker-entrypoint.sh) so worker/beat don't race it with concurrent
      # migration attempts against a fresh database.
      RUN_MIGRATIONS: "true"
      # CORS is credentialed (see app/main.py), so the frontend's exact
      # origin must be listed -- install.sh regenerates the root .env this
      # reads from with the host's actual LAN IP, so this also works when
      # browsing in from outside the VM (e.g. from Windows to a VMware
      # guest), not just from localhost.
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173"]}'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://workpilot:workpilot@postgres:5432/workpilot
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  beat:
    build: ./backend
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://workpilot:workpilot@postgres:5432/workpilot
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # See the CORS_ORIGINS comment on the backend service -- both are
      # generated together by install.sh into the root .env file.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  postgres_data:
