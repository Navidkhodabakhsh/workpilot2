services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: workpilot
      POSTGRES_PASSWORD: workpilot
      POSTGRES_DB: workpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Only runs on a brand-new (empty) volume -- seeds a demo org with
      # working phone/password logins (see backend/seed/README.md). If
      # you've already run this stack before, `docker compose down -v`
      # first so postgres_data is empty and this actually gets picked up.
      - ./backend/seed/demo_org_dump.sql:/docker-entrypoint-initdb.d/demo_org_dump.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://workpilot:workpilot@postgres:5432/workpilot
      REDIS_URL: redis://redis:6379/0
      # Only the backend container runs `alembic upgrade head` on boot (see
      # docker-entrypoint.sh) so worker/beat don't race it with concurrent
      # migration attempts against a fresh database.
      RUN_MIGRATIONS: "true"
      # CORS is credentialed (see app/main.py), so the frontend's exact
      # origin must be listed -- install.sh regenerates the root .env this
      # reads from with the host's actual LAN IP, so this also works when
      # browsing in from outside the VM (e.g. from Windows to a VMware
      # guest), not just from localhost.
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173"]}'
    ports:
      - "8000:8000"
    volumes:
      # Named volumes, not a full source bind-mount: the image already has
      # its own code baked in (see backend/Dockerfile), and a whole-tree
      # bind-mount would fight the image's non-root file ownership. Only
      # the two directories the app actually writes to at runtime need to
      # persist/be shared.
      - backend_exports:/app/exports
      - backend_attachments:/app/attachments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://workpilot:workpilot@postgres:5432/workpilot
      REDIS_URL: redis://redis:6379/0
    volumes:
      # Same exports volume as backend -- the worker writes the export
      # file, the API serves it; attachments are only ever touched by the
      # backend's own upload endpoints, so the worker doesn't need that one.
      - backend_exports:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  beat:
    build: ./backend
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://workpilot:workpilot@postgres:5432/workpilot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        # Vite bakes VITE_* vars into the static bundle at build time, so
        # this has to be a build arg, not a runtime environment variable
        # (see frontend/Dockerfile) -- install.sh regenerates the root
        # .env this reads from with the host's actual LAN IP.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_exports:
  backend_attachments:
