services:
  # 1. Frontend Configuration (React)
  - type: web
    name: workpilot-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: NODE_ENV
        value: production

  # 2. Backend Configuration (ASP.NET Core)
  - type: web
    name: workpilot-backend
    runtime: docker
    buildCommand: ""
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

databases:
  # 3. Database Configuration (PostgreSQL)
  - name: workpilot-db
    databaseName: workpilot
    user: workpilot_user
    plan: free
