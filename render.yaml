services:
  # 1. Frontend Configuration (React)
  - type: web
    name: workpilot-frontend
    runtime: static
    buildCommand: npm run build
    publishDir: dist
    routes:
      - src: /*
        dest: /index.html

  # 2. Backend Configuration (ASP.NET Core)
  - type: web
    name: workpilot-backend
    runtime: docker
    buildCommand: ""
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

databases:
  # 3. Database Configuration (PostgreSQL)
  - name: workpilot-db
    databaseName: workpilot
    user: workpilot_user
    plan: free
