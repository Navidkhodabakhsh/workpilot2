worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

  # Client-side router owns all paths -- always fall back to index.html
  # instead of 404ing on a deep link/refresh.
  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src *; font-src 'self' data:; frame-ancestors 'none'" always;

    location / {
      try_files $uri /index.html;
    }

    # Hashed build assets are safe to cache forever; index.html itself is
    # deliberately excluded so a new deploy is picked up on next load.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
      try_files $uri =404;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
  }
}
